name: hungry
description: A modern Flutter application for food ordering.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

# --------------------------------------------------
# Dependencies
# --------------------------------------------------
dependencies:
  flutter:
    sdk: flutter

  # ----------------------------
  # UI & Design
  # ----------------------------
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  font_awesome_flutter: ^10.12.0
  gap: ^3.0.1
  flutter_screenutil: ^5.9.3
  skeletonizer: ^2.1.3
  alert_banner: ^1.0.1

  # ----------------------------
  # Navigation & Routing
  # ----------------------------
  go_router: ^17.1.0

  # ----------------------------
  # State Management
  # ----------------------------
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8

  # ----------------------------
  # Dependency Injection
  # ----------------------------
  get_it: ^9.2.1

  # ----------------------------
  # Networking & Local Storage
  # ----------------------------
  dio: ^5.9.2
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0
  connectivity_plus: ^7.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ----------------------------
  # Localization
  # ----------------------------
  flutter_localizations:
    sdk: flutter
  easy_localization: ^3.0.8

  # ----------------------------
  # Crash reporting & Analytics
  # ----------------------------
  sentry_flutter: ^9.14.0

  # ----------------------------
  # Social login (backend must exchange token for app token)
  # ----------------------------
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1

  # ----------------------------
  # Media & Images
  # ----------------------------
  image_picker: ^1.2.1
  cached_network_image: ^3.4.1

  # Local notifications (order placed, order status)
  flutter_local_notifications: ^18.0.1
  url_launcher: ^6.3.1

# --------------------------------------------------
# Dev Dependencies
# --------------------------------------------------
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.12.2
  mocktail: ^1.0.4
  bloc_test: ^10.0.0

# --------------------------------------------------
# App Icons
# --------------------------------------------------
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"

# --------------------------------------------------
# Flutter Config
# --------------------------------------------------
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/translations/